<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>길드 파티 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:#eef2f7;min-height:100vh;padding:16px}
h1{text-align:center;color:#5a7fa8;font-size:20px;margin-bottom:14px}
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 18px;border:2px solid #ccd8e8;border-radius:22px;background:white;color:#7a9ab8;font-size:13px;font-weight:bold;cursor:pointer}
.tab:hover{background:#f0f6ff}
.tab.active{background:linear-gradient(135deg,#5b8fd4,#3a6ab0);color:white;border-color:#3a6ab0}
.tab.share{background:#e8f5e8;color:#2e7d2e;border-color:#a8d0a8}
.info{text-align:center;color:#999;font-size:12px;margin-bottom:12px}
.btn{padding:7px 16px;border:2px solid #bbd0ee;border-radius:20px;cursor:pointer;font-size:12px;font-weight:bold;background:#ddeaf8;color:#3a6ab0}
.btn.cancel{background:#f0f2f5;color:#7a8a9a;border-color:#d0d8e4}
.btn.confirm{background:linear-gradient(135deg,#5b8fd4,#3a6ab0);color:white;border-color:#3a6ab0}
.btn.danger{background:#fde8e8;color:#c0392b;border-color:#f5c0c0}
.btn.green{background:linear-gradient(135deg,#4caf50,#2e7d32);color:white;border-color:#2e7d32;font-size:13px;padding:10px 24px;border-radius:12px}
.bsw{width:100%;overflow-x:auto}
.scr-hint{text-align:center;font-size:10px;color:#bbb;margin-bottom:6px;display:none}
@media(max-width:1020px){.scr-hint{display:block}}
.layout{display:grid;grid-template-columns:240px repeat(4,240px);gap:10px;align-items:start;width:fit-content;margin:0 auto}
.sidebar{width:240px;display:flex;flex-direction:column;gap:6px;background:white;border-radius:14px;box-shadow:0 2px 12px rgba(91,143,212,.13);padding:10px;border:1.5px solid #dde8f4;grid-row:1/3;grid-column:1}
.slbl{font-size:11px;font-weight:bold;color:#7a9ab8;background:white;border-radius:10px;padding:7px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.slbl span{font-size:10px;color:#aac;display:block;margin-top:2px}
.sbg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sbtn{padding:7px 4px;border:2px solid #bbd0ee;border-radius:9px;cursor:pointer;font-size:11px;font-weight:bold;background:#ddeaf8;color:#3a6ab0;text-align:center}
.sbtn.wide{grid-column:1/-1}
.sbtn.dk{background:#e4ddf5;color:#5a3a9a;border-color:#c8b8e8}
.srow{display:flex;align-items:center;background:white;border-radius:10px;padding:5px 7px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex-wrap:wrap;gap:4px}
.psearch{flex:1;min-width:80px;border:none;outline:none;font-size:11px;font-family:inherit;background:transparent;padding:2px 4px}
.srow-div{width:1px;height:14px;background:#dde8f4;flex-shrink:0}
.jf-chips{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.jfc{border:none;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:bold;cursor:pointer;color:#444;opacity:.55}
.jfc:hover{opacity:.85}
.jfc.on{opacity:1;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.jfc.all{background:#cdd8e8;color:#4a6a88}
.pool-wrap{border-radius:10px;transition:outline .1s;padding:2px}
.pool-wrap.dv{outline:3px dashed #5b8fd4;background:#eaf6ff}
.pscroll{overflow-y:auto;max-height:calc(72vh - 100px);padding-right:2px}
.pscroll::-webkit-scrollbar{width:4px}
.pscroll::-webkit-scrollbar-thumb{background:#bbd0ee;border-radius:4px}
.plist{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;min-height:50px}
.pcard{background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:grab;border:2px solid transparent;overflow:hidden}
.pcard:hover{border-color:#5b8fd4}
.pcard.dragging{opacity:.3}
.pp{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;pointer-events:none;position:relative}
.pp img{width:100%;height:100%;object-fit:cover;display:block}
.pi{padding:3px 4px 4px;pointer-events:none}
/* 폰트 테두리 - 서브파티 카드 */
.pn{font-size:10px;font-weight:bold;color:#5a6a7a;word-break:break-all;text-align:center}
.pj{display:none}
.pr{display:none}
.pempty{color:#bbb;font-size:11px;text-align:center;padding:14px 4px;line-height:2}

.pgrid{grid-column:2/6;display:grid;grid-template-columns:repeat(4,240px);gap:10px;align-content:start}
.ptc{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.ptc.ex{background:#f7f9ff;border:2px dashed #c8d8ee;opacity:.85}
.phd{padding:7px 10px;border-bottom:2px solid #e8f0f8;display:flex;align-items:center;gap:4px}
.ptc.ex .phd{background:#f0f4fb}
.pnm{color:#5b8fd4;font-weight:bold;font-size:13px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
.ptc.ex .pnm{color:#8aaecc}.jzone{flex:1;display:flex;gap:2px;align-items:center;padding:0 6px;flex-wrap:wrap}
.pct{background:#eef4fc;color:#5b8fd4;font-size:10px;font-weight:bold;border-radius:8px;padding:2px 6px;flex-shrink:0}
.pwarn{display:flex;gap:2px;flex-shrink:0}
.wi{font-size:14px;cursor:help}
.pbody{padding:8px}
.slots{display:flex;flex-direction:column;gap:5px}
.slot{display:flex;align-items:center;gap:6px;border-radius:8px;padding:5px 7px;min-height:50px}
/* 슬롯에 업음한 테두리 추가 */
.slot.filled{border:1px solid rgba(0,0,0,.14);cursor:grab;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
.slot.empty{border:2px dashed #ccd8e8;cursor:pointer}
.slot.empty:hover{background:#f0f6ff;border-color:#5b8fd4}
.slot.dv{background:#e8f4ff!important;border:2px dashed #5b8fd4!important}
.slot.dragging-out{opacity:.3}
.snf{width:14px;font-size:9px;color:rgba(0,0,0,.4);font-weight:bold;flex-shrink:0;text-align:center;text-shadow:0 0 2px rgba(255,255,255,.7)}
.sne{width:14px;font-size:9px;color:#aac;font-weight:bold;flex-shrink:0;text-align:center}
.sport{width:40px;height:40px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;border:1.5px solid rgba(255,255,255,.7);box-shadow:0 0 0 1px rgba(0,0,0,.1);position:relative}
.sport img{width:100%;height:100%;object-fit:cover}
.sinfo{flex:1;min-width:0}
/* 슬롯 내부 텍스트 테두리 */
.sname{font-size:12px;font-weight:bold;color:#5a6a7a;word-break:break-all;line-height:1.2;text-shadow:0 0 1px rgba(255,255,255,.9),0 1px 1px rgba(0,0,0,.08)}
.sjob{display:none}
.srole{display:none}
.sdel{background:rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.1);color:#445;cursor:pointer;font-size:11px;flex-shrink:0;padding:2px 5px;border-radius:4px}
.sdel:hover{background:rgba(0,0,0,.22)}
.salbl{flex:1;font-size:10px;color:#aac;font-weight:bold;text-align:center}
.stpanel{grid-column:2/6;padding-top:4px}
.sttl{font-size:13px;font-weight:bold;color:#5a7fa8;margin-bottom:10px;text-align:center}
.stcard{background:white;border-radius:14px;box-shadow:0 2px 10px rgba(91,143,212,.1);padding:14px 18px;border:1.5px solid #e8f0fb}
.stchs{display:flex;flex-wrap:wrap;gap:8px}
.stch{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:5px 12px 5px 9px;font-size:11px;font-weight:bold;box-shadow:0 1px 4px rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.08)}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;max-width:1000px;margin:0 auto}
.mc{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column;align-items:center;padding-bottom:8px}
.mport{width:100%;aspect-ratio:1;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.mport img{width:100%;height:100%;object-fit:cover}
.mov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:bold;opacity:0}
.mstar{position:absolute;top:3px;right:3px;font-size:13px;line-height:1;pointer-events:none;filter:drop-shadow(0 0 2px rgba(0,0,0,.5))}
.mport:hover .mov{opacity:1}
.mn{margin-top:6px;font-size:11px;font-weight:bold;color:#2c3e50;text-align:center;padding:0 5px;word-break:break-all}
.mj{font-size:10px;font-weight:bold;margin-top:1px;text-align:center}
.mr2{font-size:9px;color:#7a9ab8;margin-top:1px;text-align:center;font-style:italic}
.mbdg{font-size:9px;color:#5b8fd4;margin-top:1px}
.mac{display:flex;gap:4px;margin-top:5px}
.mbtn{border:2px solid #bbd0ee;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:bold;background:#ddeaf8;color:#3a6ab0}
.mbtn.del{background:#fde8e8;color:#c0392b;border-color:#f5c0c0}
.tw{overflow-x:auto;margin:0 auto 14px;max-width:50%}
table.pt{width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0;background:white;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;min-width:250px}
table.pt th{background:linear-gradient(135deg,#5b8fd4,#3a6ab0);color:white;font-size:12px;font-weight:bold;padding:8px 6px;text-align:center;overflow:hidden;white-space:nowrap}
table.pt td{padding:6px 5px;font-size:12px;text-align:center;border-bottom:1px solid #eef2f8;color:#2c3e50;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.pt tr:last-child td{border-bottom:none}
table.pt tr:hover td{background:#f5f9ff}
table.pt tr.ex td{color:#9ab0c8;background:#f5f8fc}
.tc{display:inline-flex;align-items:center;gap:5px}
.tcp{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;overflow:hidden;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.tcp img{width:100%;height:100%;object-fit:cover}
.tblst{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 16px;max-width:50%;margin:0 auto}
.tblst h3{font-size:13px;color:#5a7fa8;margin-bottom:10px;font-weight:bold;text-align:center}
.tblchs{display:flex;flex-wrap:wrap;gap:6px}
.tblch{display:flex;align-items:center;gap:5px;border-radius:10px;padding:5px 12px;font-size:11px;box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:bold;border:1px solid rgba(0,0,0,.07)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:white;border-radius:18px;padding:22px 20px;width:360px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.modal h2{font-size:16px;color:#3a6ab0;margin-bottom:14px;text-align:center}
.fl{font-size:11px;color:#7a9ab8;font-weight:bold;margin-bottom:4px}
.fi{width:100%;border:2px solid #dde8f0;border-radius:10px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px;display:block;background:white;cursor:pointer;appearance:auto}
.fi:focus{border-color:#5b8fd4}
.fta{width:100%;border:2px solid #dde8f0;border-radius:10px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px;display:block;height:100px;resize:vertical}
.fta:focus{border-color:#5b8fd4}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.hint{font-size:11px;color:#999;margin-bottom:8px}
.picklist{max-height:260px;overflow-y:auto;border:2px solid #eef4f8;border-radius:10px;margin-bottom:10px}
.pitem{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;border-bottom:1px solid #f0f4f8}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:#eef6ff}
.pport{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
.pport img{width:100%;height:100%;object-fit:cover}
.sstep{display:flex;align-items:flex-start;gap:10px;background:#f8faff;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.snum{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#5b8fd4,#3a6ab0);color:white;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stxt{font-size:12px;color:#445;line-height:1.6}
.nurl{background:#e8f5e8;border:2px solid #a8d0a8;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:bold;color:#2e7d2e;text-align:center;margin:4px 0 8px}
.mtbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}

/* === 참여 탭 === */
.atbar{max-width:720px;margin:12px auto 8px;background:white;border-radius:12px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;gap:7px;}
.atcnt{font-size:12px;color:#7a9ab8;text-align:center;font-weight:bold;}
.atlist{display:flex;flex-direction:column;gap:6px;max-width:720px;margin:0 auto;padding:0 12px 20px;}
.atcard{background:white;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:9px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid #eef2f8;transition:border-color .14s,background .14s;}
.atcard:hover{border-color:#aac8e8;}
.atcard.on{border-color:#4caf50;background:#f2fff4;}
.atport{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;overflow:hidden;}
.atport img{width:100%;height:100%;object-fit:cover;}
.atinfo{flex:1;min-width:0;}
.atname{font-size:13px;font-weight:bold;color:#2c3e50;}
.atjob{font-size:11px;font-weight:bold;margin-top:2px;}
.atchk{width:20px;height:20px;accent-color:#4caf50;cursor:pointer;flex-shrink:0;}

/* ── 멤버탭 선택 레이아웃 ── */
.ml-wrap{display:flex;gap:0;align-items:flex-start;max-width:1100px;margin:0 auto;}
.ml-left{flex:1;min-width:0;padding:0 10px 0 0;}
.ml-filter{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:10px 12px 8px;margin:0 auto 10px;width:360px;}
.mf-srow{display:flex;align-items:center;gap:6px;}
.ml-right{width:220px;flex-shrink:0;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:12px;position:sticky;top:10px;max-height:calc(100vh - 120px);overflow-y:auto;}
.msel-hd{margin-bottom:10px;}
.msel-title{font-size:13px;font-weight:bold;color:#2c3e50;}
.msel-list{display:flex;flex-direction:column;gap:5px;}
.msel-chip{display:flex;align-items:center;gap:7px;background:#f0fff4;border:1.5px solid #81c784;border-radius:9px;padding:5px 8px;cursor:pointer;transition:background .15s;}
.msel-chip:hover{background:#e0f7ea;}
.msel-chip .sc-port{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;}
.msel-chip .sc-port img{width:100%;height:100%;object-fit:cover;}
.msel-chip .sc-name{font-size:12px;font-weight:bold;color:#2c3e50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.msel-chip .sc-job{font-size:10px;margin-top:1px;}
.msel-empty{font-size:12px;color:#bbb;text-align:center;padding:20px 0;}
.mc.sel{outline:3px solid #4caf50;outline-offset:2px;}
.mc{cursor:pointer;}
</style>
<script type='module'>
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyASYnJ3rp1I7mHeERNS2mG01ZVICBsLC14",
    authDomain: "adele-6c980.firebaseapp.com",
    databaseURL: "https://adele-6c980-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "adele-6c980",
    storageBucket: "adele-6c980.firebasestorage.app",
    messagingSenderId: "106975214015",
    appId: "1:106975214015:web:0c4ba8b33275e6d2e1090a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._fbDb = db;
  window._fbRef = ref;
  window._fbSet = set;
  window._fbOnValue = onValue;
  console.log('Firebase connected!');
</script>
</head>
<body>
<h1>&#9876;&#65039; 길드 파티 관리</h1>
<div class="tabs">
  <button class="tab" id="t-member" onclick="goTab('member')">&#128101; 멤버</button>
  <button class="tab active" id="t-board" onclick="goTab('board')">&#128202; 보드</button>
  <button class="tab" id="t-table" onclick="goTab('table')">&#128203; 표</button>
  <button class="tab share" onclick="openM('mShare')">&#128228; Netlify 공유</button>
</div>
<div class="info" id="info"></div>

<div id="v-member" style="display:none">
  <div class="mtbar">
    <button class="btn" id="sortBtn" onclick="toggleSort()">&#8597; 정렬</button>
    <button class="btn" onclick="openM('mAdd')">+ 추가</button>
    <button class="btn" onclick="openM('mPaste')">&#128203; 일괄추가</button>
    <button class="btn danger" onclick="delAll()">&#128465; 전체삭제</button>
  </div>
  <!-- 필터창: 버튼과 동일 중앙 정렬 -->
  <div class="ml-filter">
    <div class="mf-srow">
      <span style="font-size:12px;color:#aac">&#128269;</span>
      <input class="psearch" id="mfQ" placeholder="닉네임 검색..." oninput="mfq();" style="flex:1">
      <button id="mfJfBtn" onclick="toggleMfJf()" style="background:none;border:1.5px solid #bbd0ee;border-radius:8px;padding:2px 9px;cursor:pointer;font-size:12px;color:#7a9ab8;flex-shrink:0">&#9660; 직업</button>
    </div>
    <div id="mfjfpop" style="display:none;background:#f8faff;border-radius:8px;padding:6px 4px;margin-top:4px">
      <div class="jf-chips" id="mfjfchips"></div>
    </div>
    <div id="mfcnt" style="font-size:11px;color:#9ab;text-align:center;padding:3px 0"></div>
  </div>
  <div class="ml-wrap">
    <div class="ml-left">
      <div class="mg" id="mgrid"></div>
    </div>
    <!-- 오른쪽: 선택된 멤버 패널 -->
    <div class="ml-right" id="mselPanel">
      <div class="msel-hd">
        <div class="msel-title">&#9876;&#65039; 참여 인원 <span id="mselcnt" style="font-size:11px;font-weight:normal;color:#7a9ab8"></span></div>
        <div class="mf-srow" style="margin-top:6px">
          <button id="mselJfBtn" onclick="toggleMselJf()" style="background:none;border:1.5px solid #bbd0ee;border-radius:8px;padding:2px 9px;cursor:pointer;font-size:12px;color:#7a9ab8;flex-shrink:0;width:100%">&#9660; 직업 필터</button>
        </div>
        <div id="mseljfpop" style="display:none;background:#f8faff;border-radius:8px;padding:6px 4px;margin-top:4px">
          <div class="jf-chips" id="mseljfchips"></div>
        </div>
        <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
          <button onclick="selectAll()" style="flex:1;font-size:11px;background:#e8f4fd;border:1px solid #bbd0ee;border-radius:7px;padding:3px 0;cursor:pointer;color:#5b8fd4">전체선택</button>
          <button onclick="deselectAll()" style="flex:1;font-size:11px;background:#fde8e8;border:1px solid #f0c0c0;border-radius:7px;padding:3px 0;cursor:pointer;color:#d44">전체해제</button>
        </div>
      </div>
      <div class="msel-list" id="msellist"></div>
    </div>
  </div>
</div>

<div id="v-board">
  <div class="scr-hint">&#8596; 좌우로 스크롤하세요</div>
  <div class="bsw"><div class="layout">
    <div class="sidebar">

function setJic(el,ji,px){
  if(ji.ic&&ji.ic.indexOf('data:')===0){
    var im=document.createElement('img');im.src=ji.ic;
    var s=(px||22)+'px';im.style.cssText='width:'+s+';height:'+s+';object-fit:contain;display:block';
    el.appendChild(im);
  }else{el.textContent=ji.ic;}
}
function jicHTML(ji){
  if(ji.ic&&ji.ic.indexOf('data:')===0)return '<img src="'+ji.ic+'" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:middle">';
  return ji.ic;
}


function fillJobSelect(selId, curVal){
  var sel=el(selId);sel.innerHTML='';
  var opt0=document.createElement('option');opt0.value='';opt0.textContent='직업 선택해주세요';
  sel.appendChild(opt0);
  JM.forEach(function(jm){
    var opt=document.createElement('option');
    opt.value=jm.label;
    opt.textContent=(jm.ic&&jm.ic.indexOf('data:')===0?'':jm.ic+' ')+jm.label;
    if(curVal&&curVal===jm.label){opt.selected=true;}
    else if(curVal){for(var k=0;k<jm.keys.length;k++){if(curVal.indexOf(jm.keys[k])>=0){opt.selected=true;break;}}}
    sel.appendChild(opt);
  });
}

function gji(job){if(!job)return DJ;for(var i=0;i<JM.length;i++)for(var k=0;k<JM[i].keys.length;k++)if(job.indexOf(JM[i].keys[k])>=0)return JM[i];return DJ;}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function el(id){return document.getElementById(id);}
function mk(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e;}
function openM(id){el(id).classList.add('show');}
function closeM(id){el(id).classList.remove('show');}

function loadD(){
  var raw=null,keys=['gm10','gm9','gm8','gm7','gm6','gm5','gm4','gm3_v3'];
  for(var i=0;i<keys.length;i++){raw=localStorage.getItem(keys[i]);if(raw)break;}
  if(raw){try{var d=JSON.parse(raw);members=d.members||[];parties=d.parties||[];selectedSet=d.selectedSet||{};}catch(e){}}
  while(parties.length<PC)parties.push({id:uid(),name:(parties.length+1)+'파티'});
  parties=parties.slice(0,PC);
  members=members.map(function(m){return{id:m.id||uid(),name:m.name||'',job:m.job||'',portrait:m.portrait||null,partyId:m.partyId||null,slotIndex:(m.slotIndex!=null)?m.slotIndex:null,star:m.star||false};});
  fillJobSelect('aJ','');
  fillJobSelect('eJ','');
}
function saveD(){localStorage.setItem(SK,JSON.stringify({members:members,parties:parties,selectedSet:selectedSet}));}

function goTab(t){
  curTab=t;
  ['member','board','table'].forEach(function(s){el('t-'+s).classList.toggle('active',s===t);el('v-'+s).style.display=(s===t)?'':'none';});
  render();
}
function render(){
  var sub=members.filter(function(m){return !m.partyId&&selectedSet[m.id]!==false;});
  el('info').textContent='전체 '+members.length+'명 · 배정 '+(members.length-sub.length)+'명 · 서브파티 '+sub.length+'명';
  if(curTab==='member')rMembers();
  else if(curTab==='board')renderBoard();
  else rTable();
}

function buildMfFilter(){
  var jobSet={};
  members.forEach(function(m){var j=m.job||'';if(j)jobSet[j]=(jobSet[j]||0)+1;});
  var jobs=Object.keys(jobSet),ri=function(j){for(var i=0;i<JM.length;i++)for(var k=0;k<JM[i].keys.length;k++)if(j.indexOf(JM[i].keys[k])>=0)return i;return JM.length;};
  jobs.sort(function(a,b){return ri(a)-ri(b)||(a<b?-1:a>b?1:0);});
  // 그리드 위 필터
  var wrap=el('mfjfchips');if(wrap){wrap.innerHTML='';
    var aBtn=mk('button','jfc all '+(mfActiveJobs.length===0?'on':''),'전체');
    aBtn.onclick=function(){mfActiveJobs=[];rMembers();};
    wrap.appendChild(aBtn);
    jobs.forEach(function(j){var ji=gji(j),on=mfActiveJobs.indexOf(j)>=0,btn=mk('button','jfc '+(on?'on':''));
      btn.innerHTML=jicHTML(ji);btn.style.background=ji.bg;btn.style.color=ji.col;btn.title=j;
      (function(job){btn.onclick=function(){var idx=mfActiveJobs.indexOf(job);if(idx>=0)mfActiveJobs.splice(idx,1);else mfActiveJobs.push(job);rMembers();};})(j);
      wrap.appendChild(btn);});
  }
  // 선택 패널 위 필터
  var wrap2=el('mseljfchips');if(wrap2){wrap2.innerHTML='';
    var aBtn2=mk('button','jfc all '+(mseljActiveJobs.length===0?'on':''),'전체');
    aBtn2.onclick=function(){mseljActiveJobs=[];rMembers();};
    wrap2.appendChild(aBtn2);
    jobs.forEach(function(j){var ji=gji(j),on=mseljActiveJobs.indexOf(j)>=0,btn=mk('button','jfc '+(on?'on':''));
      btn.innerHTML=jicHTML(ji);btn.style.background=ji.bg;btn.style.color=ji.col;btn.title=j;
      (function(job){btn.onclick=function(){var idx=mseljActiveJobs.indexOf(job);if(idx>=0)mseljActiveJobs.splice(idx,1);else mseljActiveJobs.push(job);rMembers();};})(j);
      wrap2.appendChild(btn);});
  }
}

function autoAssign(){
  if(!confirm('미배정 인원을 아래 우선순위로 배정할까요?\n\n1순위. 하이프리스트, 집시/클로운 1명씩\n2순위. 소환사/크리에이터 1명\n3순위. 물리딜러, 마법딜러 1명씩\n4순위. 소환사/크리에이터 부족 시 물리/마법딜러 충원\n5순위. 남은 인원 빈 자리 무작위 배정'))return;
  function isJ(m){var args=Array.prototype.slice.call(arguments,1);return args.some(function(k){return m.job&&m.job.indexOf(k)>=0;});}
  function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=b[i];b[i]=b[j];b[j]=t;}return b;}
  function starShuf(a){var s=shuf(a.filter(function(m){return m.star;}));var n=shuf(a.filter(function(m){return !m.star;}));return s.concat(n);}
  var canAssign=members.filter(function(m){return selectedSet[m.id]!==false&&!m.partyId;});
  var heal1=starShuf(canAssign.filter(function(m){return isJ(m,'하이프리스트');}));
  var heal2=starShuf(canAssign.filter(function(m){return isJ(m,'집시','클로운');}));
  var buf=starShuf(canAssign.filter(function(m){return isJ(m,'소환사','크리에이터');}));
  var phys=starShuf(canAssign.filter(function(m){return isJ(m,'팔라딘','로드나이트','리벨리온','건슬링어','스나이퍼','어쌔신크로스');}));
  var mag=starShuf(canAssign.filter(function(m){return isJ(m,'프로페서','하이위저드');}));
  var used={};
  function pick(pool){for(var i=0;i<pool.length;i++){if(!used[pool[i].id])return pool[i];}return null;}
  var act=parties.slice(0,PCN);
  warnParties={};
  act.forEach(function(p){
    function slotFree(si){return !members.some(function(m){return m.partyId===p.id&&m.slotIndex===si;});}
    // 1순위: 하이프리스트(slot 3), 집시/클로운(slot 4)
    if(slotFree(3)){var h1=pick(heal1);if(h1){h1.partyId=p.id;h1.slotIndex=3;used[h1.id]=true;}}
    if(slotFree(4)){var h2=pick(heal2);if(h2){h2.partyId=p.id;h2.slotIndex=4;used[h2.id]=true;}}
    // 2순위: 소환사/크리에이터(slot 2) - 같은 직업 중복 방지
    if(slotFree(2)){
      var bf=null;
      for(var bi=0;bi<buf.length;bi++){
        if(used[buf[bi].id])continue;
        if(isJ(buf[bi],'소환사')&&members.some(function(m){return m.partyId===p.id&&isJ(m,'소환사');}))continue;
        if(isJ(buf[bi],'크리에이터')&&members.some(function(m){return m.partyId===p.id&&isJ(m,'크리에이터');}))continue;
        bf=buf[bi];break;
      }
      if(bf){bf.partyId=p.id;bf.slotIndex=2;used[bf.id]=true;}
      else{
        // 4순위: 소환사/크리에이터 없으면 물리딜러로 충원, 없으면 마법딜러로 충원
        var sub=pick(phys)||pick(mag);
        if(sub){sub.partyId=p.id;sub.slotIndex=2;used[sub.id]=true;}
      }
    }
    // 3순위: 물리딜러(slot 0), 마법딜러(slot 1)
    if(slotFree(0)){var ph=pick(phys);if(ph){ph.partyId=p.id;ph.slotIndex=0;used[ph.id]=true;}}
    if(slotFree(1)){var mg=pick(mag);if(mg){mg.partyId=p.id;mg.slotIndex=1;used[mg.id]=true;}}
  });
  // 5순위: 남은 인원 빈 슬롯에 직업 무관 배정 (단, 소환사/크리에이터는 파티당 1명 제한)
  var rest=starShuf(canAssign.filter(function(m){return !used[m.id];}));
  var restUsed={};
  act.forEach(function(p){
    for(var si=0;si<SC;si++){
      var filled=members.some(function(m){return m.partyId===p.id&&m.slotIndex===si;});
      if(!filled){
        for(var ri=0;ri<rest.length;ri++){
          if(restUsed[rest[ri].id])continue;
          var cand=rest[ri];
          // 소환사끼리 중복 방지
          if(isJ(cand,'소환사')&&members.some(function(m){return m.partyId===p.id&&isJ(m,'소환사');}))continue;
          // 크리에이터끼리 중복 방지
          if(isJ(cand,'크리에이터')&&members.some(function(m){return m.partyId===p.id&&isJ(m,'크리에이터');}))continue;
          // 하이프리스트끼리 중복 방지
          if(isJ(cand,'하이프리스트')&&members.some(function(m){return m.partyId===p.id&&isJ(m,'하이프리스트');}))continue;
          // 집시/클로운끼리 중복 방지
          if((isJ(cand,'집시')||isJ(cand,'클로운'))&&members.some(function(m){return m.partyId===p.id&&(isJ(m,'집시')||isJ(m,'클로운'));}))continue;
          cand.partyId=p.id;cand.slotIndex=si;restUsed[cand.id]=true;
          break;
        }
      }
    }
  });
  saveD();render();
}
